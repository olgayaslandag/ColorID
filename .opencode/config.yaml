# =============================================================================
# RULES YAPILANDIRMASI
# =============================================================================
rules:
  # Tüm agent'lar tarafından okunan global kurallar
  global: ".opencode/rules/_global.md"

  # Agent bazlı özel kurallar
  agent_specific:

    # ---------------------------------------------------------
    # Code Refiner - Tüm kuralları okur (Denetçi)
    # ---------------------------------------------------------
    code_refiner:
      - ".opencode/rules/_global.md"
      - ".opencode/rules/architecture.md"
      - ".opencode/rules/naming.md"
      - ".opencode/rules/security.md"
      - ".opencode/rules/backend.md"
      - ".opencode/rules/api.md"
      - ".opencode/rules/database.md"
      - ".opencode/rules/frontend-blade.md"
      - ".opencode/rules/frontend-inertia.md"
      - ".opencode/rules/test.md"
      - ".opencode/rules/devops.md"
      - ".opencode/rules/cross-agent.md"

    # ---------------------------------------------------------
    # Senior Backend Architect - Service, Repository, Model
    # ---------------------------------------------------------
    senior_backend_architect:
      - ".opencode/rules/_global.md"
      - ".opencode/rules/architecture.md"
      - ".opencode/rules/naming.md"
      - ".opencode/rules/security.md"
      - ".opencode/rules/backend.md"
      - ".opencode/rules/database.md"
      - ".opencode/rules/cross-agent.md"

    # ---------------------------------------------------------
    # Senior API & HTTP Architect - Controller, Request, Resource
    # ---------------------------------------------------------
    senior_api_http_architect:
      - ".opencode/rules/_global.md"
      - ".opencode/rules/architecture.md"
      - ".opencode/rules/naming.md"
      - ".opencode/rules/security.md"
      - ".opencode/rules/api.md"
      - ".opencode/rules/cross-agent.md"

    # ---------------------------------------------------------
    # Senior Database Architect - Migration, Seeder, Factory
    # ---------------------------------------------------------
    senior_database_architect:
      - ".opencode/rules/_global.md"
      - ".opencode/rules/naming.md"
      - ".opencode/rules/security.md"
      - ".opencode/rules/database.md"
      - ".opencode/rules/cross-agent.md"

    # ---------------------------------------------------------
    # Senior Frontend Blade Architect - Blade Views, Components
    # ---------------------------------------------------------
    senior_frontend_blade_architect:
      - ".opencode/rules/_global.md"
      - ".opencode/rules/naming.md"
      - ".opencode/rules/security.md"
      - ".opencode/rules/frontend-blade.md"
      - ".opencode/rules/cross-agent.md"

    # ---------------------------------------------------------
    # Frontend Inertia Architect - React, TypeScript, Inertia
    # ---------------------------------------------------------
    frontend_inertia_architect:
      - ".opencode/rules/_global.md"
      - ".opencode/rules/naming.md"
      - ".opencode/rules/security.md"
      - ".opencode/rules/frontend-inertia.md"
      - ".opencode/rules/cross-agent.md"

    # ---------------------------------------------------------
    # Senior Test Architect - Pest, Unit, Feature Tests
    # ---------------------------------------------------------
    senior_test_architect:
      - ".opencode/rules/_global.md"
      - ".opencode/rules/architecture.md"
      - ".opencode/rules/naming.md"
      - ".opencode/rules/test.md"
      - ".opencode/rules/cross-agent.md"

    # ---------------------------------------------------------
    # Senior DevOps Architect - CI/CD, Config, Deployment
    # ---------------------------------------------------------
    senior_devops_architect:
      - ".opencode/rules/_global.md"
      - ".opencode/rules/naming.md"
      - ".opencode/rules/security.md"
      - ".opencode/rules/devops.md"
      - ".opencode/rules/cross-agent.md"

  # ---------------------------------------------------------
  # Kural Öncelikleri (Conflict Resolution)
  # ---------------------------------------------------------
  priorities:
    critical:
      - "security.md"
      - "architecture.md"
    high:
      - "naming.md"
      - "cross-agent.md"
    medium:
      - "backend.md"
      - "api.md"
      - "database.md"
    low:
      - "frontend-blade.md"
      - "frontend-inertia.md"
      - "test.md"
      - "devops.md"

  # ---------------------------------------------------------
  # Kural İhlali Davranışı
  # ---------------------------------------------------------
  violations:
    on_violation: "warn"  # warn, block, ask
    require_approval_for:
      - "security.md"
      - "architecture.md"
    auto_fix:
      - "naming.md"


# -----------------------------------------------------------------------------
# KATI KURALLAR (ENFORCED RULES)
# -----------------------------------------------------------------------------
enforced_rules:
  - "Katman Sınırı: Controller asla DB sorgusu yapamaz (API Architect -> Core Architect)."
  - "İsimlendirme: Migration/Factory/Seeder hiyerarşisine sadık kalınacak."
  - "Tip Güvenliği: Tüm PHP dosyaları 'strict_types=1' içermeli."
  - "Geri Alınabilirlik: Her migration'ın 'down()' metodu dolu olmalı."
  - "Güvenlik: Blade'de '{!! !!}' kullanımı sadece 'Code Refiner' onayıyla olabilir."
  - "Modülerlik: Logic, Service sınıfları dışına taşamaz."

# -----------------------------------------------------------------------------
# OTOMASYON VE SİSTEM AYARLARI
# -----------------------------------------------------------------------------
settings:
  auto_load: true
  refine_after_write: true
  ask_before_breaking_change: true
  max_context_files: 15
  check_for_n_plus_one: true

# -----------------------------------------------------------------------------
# İŞ AKIŞLARI (WORKFLOWS)
# -----------------------------------------------------------------------------
workflows:
  new_feature:
    description: "DB -> Core -> API -> Frontend -> Test döngüsüyle tam özellik geliştirme"
    trigger: "yeni özellik ekle:"

  security_audit:
    description: "Tüm sistemin güvenlik açıklarını tarar"
    trigger: "@security-check"


# =============================================================================
# SKILLS YAPILANDIRMASI
# =============================================================================
skills:
  # Auto-load skills for all agents
  auto_load: true

  # Skill directories
  directories:
    - ".opencode/skills/laravel"
    - ".opencode/skills/security"
    - ".opencode/skills/testing"
    - ".opencode/skills/database"
    - ".opencode/skills/frontend"
    - ".opencode/skills/devops"

  # Agent-specific skill mappings
  agent_skills:
    senior_backend_architect:
      - "laravel/repository-pattern.md"
      - "laravel/service-pattern.md"
      - "security/sql-injection-prevention.md"
      - "testing/unit-test-pattern.md"

    senior_api_http_architect:
      - "laravel/form-request-validation.md"
      - "laravel/api-resource-transformation.md"
      - "security/csrf-protection.md"

    senior_database_architect:
      - "database/migration-patterns.md"
      - "database/eloquent-relationships.md"
      - "database/query-optimization.md"

    senior_frontend_blade_architect:
      - "frontend/blade-component-pattern.md"

    frontend_inertia_architect:
      - "frontend/inertia-react-pattern.md"
      - "frontend/form-handling-pattern.md"
      - "frontend/state-management-pattern.md"

    senior_test_architect:
      - "testing/unit-test-pattern.md"
      - "testing/feature-test-pattern.md"
      - "testing/mocking-pattern.md"
      - "testing/pest-syntax-examples.md"

    senior_devops_architect:
      - "devops/ci-cd-pattern.md"
      - "devops/deployment-checklist.md"
      - "devops/monitoring-setup.md"

    code_refiner:
      - "security/sql-injection-prevention.md"
      - "security/xss-prevention.md"
      - "security/authentication-patterns.md"
      - "testing/unit-test-pattern.md"

  # Skill usage settings
  settings:
    suggest_on_context: true  # İlgili skill'i otomatik öner
    require_for_patterns: true  # Pattern kullanırken skill referans zorunlu
    update_on_change: true  # Skill değişince ilgili agent'lara bildir
