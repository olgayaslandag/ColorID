# =============================================================================
# Docker Compose — Laravel Photo Builder Platform
# Services: nginx, php-fpm, mysql, redis, horizon
# =============================================================================

version: "3.8"

x-common-variables: &common-variables
    # Application
    APP_NAME: "${APP_NAME:-PhotoBuilder}"
    APP_ENV: "${APP_ENV:-local}"
    APP_KEY: "${APP_KEY}"
    APP_DEBUG: "${APP_DEBUG:-false}"
    APP_URL: "${APP_URL:-http://localhost}"
    APP_LOCALE: "${APP_LOCALE:-en}"
    APP_FALLBACK_LOCALE: "${APP_FALLBACK_LOCALE:-en}"

    # Database
    DB_CONNECTION: "${DB_CONNECTION:-mysql}"
    DB_HOST: "${DB_HOST:-mysql}"
    DB_PORT: "${DB_PORT:-3306}"
    DB_DATABASE: "${DB_DATABASE:-photobuilder}"
    DB_USERNAME: "${DB_USERNAME:-photobuilder}"
    DB_PASSWORD: "${DB_PASSWORD:-secret}"

    # Redis
    REDIS_CLIENT: "${REDIS_CLIENT:-phpredis}"
    REDIS_HOST: "${REDIS_HOST:-redis}"
    REDIS_PASSWORD: "${REDIS_PASSWORD:-null}"
    REDIS_PORT: "${REDIS_PORT:-6379}"
    REDIS_PERSISTENT: "${REDIS_PERSISTENT:-false}"

    # Cache & Session
    CACHE_STORE: "${CACHE_STORE:-redis}"
    SESSION_DRIVER: "${SESSION_DRIVER:-redis}"
    SESSION_LIFETIME: "${SESSION_LIFETIME:-120}"
    SESSION_ENCRYPT: "${SESSION_ENCRYPT:-false}"

    # Queue
    QUEUE_CONNECTION: "${QUEUE_CONNECTION:-redis}"

    # Logging
    LOG_CHANNEL: "${LOG_CHANNEL:-stack}"
    LOG_LEVEL: "${LOG_LEVEL:-debug}"
    LOG_STACK: "${LOG_STACK:-single}"

    # OpenAI
    OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
    OPENAI_MODEL: "${OPENAI_MODEL:-gpt-image-2}"
    OPENAI_IMAGE_SIZE: "${OPENAI_IMAGE_SIZE:-1024x1024}"
    OPENAI_IMAGE_QUALITY: "${OPENAI_IMAGE_QUALITY:-high}"

    # Image Storage
    IMAGE_STORAGE_DISK: "${IMAGE_STORAGE_DISK:-public}"
    FILESYSTEM_DISK: "${FILESYSTEM_DISK:-local}"

    # Cloudflare R2
    CLOUDFLARE_R2_ACCESS_KEY_ID: "${CLOUDFLARE_R2_ACCESS_KEY_ID:-}"
    CLOUDFLARE_R2_SECRET_ACCESS_KEY: "${CLOUDFLARE_R2_SECRET_ACCESS_KEY:-}"
    CLOUDFLARE_R2_BUCKET: "${CLOUDFLARE_R2_BUCKET:-}"
    CLOUDFLARE_R2_URL: "${CLOUDFLARE_R2_URL:-}"
    CLOUDFLARE_R2_ENDPOINT: "${CLOUDFLARE_R2_ENDPOINT:-}"

    # AWS
    AWS_ACCESS_KEY_ID: "${AWS_ACCESS_KEY_ID:-}"
    AWS_SECRET_ACCESS_KEY: "${AWS_SECRET_ACCESS_KEY:-}"
    AWS_DEFAULT_REGION: "${AWS_DEFAULT_REGION:-us-east-1}"
    AWS_BUCKET: "${AWS_BUCKET:-}"
    AWS_USE_PATH_STYLE_ENDPOINT: "${AWS_USE_PATH_STYLE_ENDPOINT:-false}"

    # Mail
    MAIL_MAILER: "${MAIL_MAILER:-log}"
    MAIL_HOST: "${MAIL_HOST:-127.0.0.1}"
    MAIL_PORT: "${MAIL_PORT:-2525}"
    MAIL_USERNAME: "${MAIL_USERNAME:-null}"
    MAIL_PASSWORD: "${MAIL_PASSWORD:-null}"
    MAIL_FROM_ADDRESS: "${MAIL_FROM_ADDRESS:-hello@example.com}"
    MAIL_FROM_NAME: "${MAIL_FROM_NAME:-PhotoBuilder}"

    # Broadcasting
    BROADCAST_CONNECTION: "${BROADCAST_CONNECTION:-log}"

    # Laravel specific
    TELESCOPE_ENABLED: "${TELESCOPE_ENABLED:-false}"
    HORIZON_NAME: "${HORIZON_NAME:-photobuilder-horizon}"

services:
    # =========================================================================
    # Nginx — Web Server
    # =========================================================================
    nginx:
        image: nginx:alpine
        container_name: photobuilder-nginx
        restart: unless-stopped
        ports:
            - "${NGINX_PORT:-80}:80"
        volumes:
            - app-data:/var/www:ro
            - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
            - nginx-logs:/var/log/nginx
        depends_on:
            php:
                condition: service_started
        networks:
            - photobuilder-network
        healthcheck:
            test: ["CMD", "nginx", "-t"]
            interval: 30s
            timeout: 5s
            retries: 3

    # =========================================================================
    # PHP — PHP-FPM Application Server
    # =========================================================================
    php:
        build:
            context: .
            dockerfile: docker/php/Dockerfile
        container_name: photobuilder-php
        restart: unless-stopped
        volumes:
            - app-data:/var/www:delegated
            - storage-data:/var/www/storage:delegated
            - ./docker/php/php.ini:/usr/local/etc/php/php.ini:ro
            - ./docker/php/www.conf:/usr/local/etc/php-fpm.d/www.conf:ro
        environment:
            <<: *common-variables
            RUN_MIGRATIONS: "${RUN_MIGRATIONS:-true}"
        depends_on:
            mysql:
                condition: service_healthy
            redis:
                condition: service_healthy
        networks:
            - photobuilder-network
        healthcheck:
            test: ["CMD-SHELL", "php -m | grep -q pdo_mysql || exit 1"]
            interval: 30s
            timeout: 10s
            start_period: 10s
            retries: 3

    # =========================================================================
    # MySQL — Relational Database
    # =========================================================================
    mysql:
        image: mysql:8.0
        container_name: photobuilder-mysql
        restart: unless-stopped
        ports:
            - "${MYSQL_EXPOSE_PORT:-3306}:3306"
        volumes:
            - mysql-data:/var/lib/mysql
        environment:
            MYSQL_DATABASE: "${DB_DATABASE:-photobuilder}"
            MYSQL_USER: "${DB_USERNAME:-photobuilder}"
            MYSQL_PASSWORD: "${DB_PASSWORD:-secret}"
            MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD:-root_secret}"
            MYSQL_ALLOW_EMPTY_PASSWORD: "no"
        command:
            - "--default-authentication-plugin=mysql_native_password"
            - "--character-set-server=utf8mb4"
            - "--collation-server=utf8mb4_unicode_ci"
            - "--innodb_buffer_pool_size=1G"
            - "--innodb_log_file_size=256M"
            - "--max_allowed_packet=64M"
            - "--sort_buffer_size=4M"
            - "--join_buffer_size=4M"
            - "--tmp_table_size=64M"
            - "--max_connections=300"
        networks:
            - photobuilder-network
        healthcheck:
            test:
                [
                    "CMD",
                    "mysqladmin",
                    "ping",
                    "-h",
                    "localhost",
                    "-u",
                    "root",
                    "-p${MYSQL_ROOT_PASSWORD:-root_secret}",
                ]
            interval: 10s
            timeout: 5s
            retries: 10
            start_period: 30s

    # =========================================================================
    # Redis — Cache, Session, Queue Driver
    # =========================================================================
    redis:
        image: redis:7-alpine
        container_name: photobuilder-redis
        restart: unless-stopped
        ports:
            - "${REDIS_EXPOSE_PORT:-6379}:6379"
        volumes:
            - redis-data:/data
        command: redis-server --appendonly yes --save 60 1 --save 300 10
        networks:
            - photobuilder-network
        healthcheck:
            test: ["CMD", "redis-cli", "ping"]
            interval: 10s
            timeout: 5s
            retries: 5

    # =========================================================================
    # Horizon — Queue Worker (separate container for dedicated processing)
    # =========================================================================
    horizon:
        build:
            context: .
            dockerfile: docker/horizon/Dockerfile
        container_name: photobuilder-horizon
        restart: unless-stopped
        volumes:
            - app-data:/var/www:delegated
            - storage-data:/var/www/storage:delegated
        environment:
            <<: *common-variables
        depends_on:
            php:
                condition: service_started
            mysql:
                condition: service_healthy
            redis:
                condition: service_healthy
        networks:
            - photobuilder-network
        healthcheck:
            test: ["CMD-SHELL", "php artisan horizon:status --quiet || exit 1"]
            interval: 30s
            timeout: 10s
            start_period: 20s
            retries: 3

# =============================================================================
# Named Volumes
# =============================================================================
volumes:
    app-data:
        driver: local
        driver_opts:
            type: none
            device: "${PWD}"
            o: bind
    storage-data:
        driver: local
    mysql-data:
        driver: local
    redis-data:
        driver: local
    nginx-logs:
        driver: local

# =============================================================================
# Network
# =============================================================================
networks:
    photobuilder-network:
        driver: bridge
