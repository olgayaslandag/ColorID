# =============================================================================
# Nginx Configuration for Laravel Photo Builder Platform
# Performance-optimized with security headers, gzip, and static file caching
# =============================================================================

upstream php-fpm {
    server php:9000;
    # Add multiple upstreams for load balancing if scaling horizontally:
    # server php:9001;
    # server php:9002;
}

server {
    listen 80;
    listen [::]:80;

    server_name localhost;
    root /var/www/public;

    index index.php index.html;

    # =========================================================================
    # Security Headers (Hardened for Production)
    # =========================================================================
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Content Security Policy - Relaxed for local dev; harden in production
    add_header Content-Security-Policy "
        default-src 'self';
        script-src 'self' 'unsafe-inline' 'unsafe-eval';
        style-src 'self' 'unsafe-inline';
        img-src 'self' data: blob: https:;
        font-src 'self' data:;
        connect-src 'self' https:;
        frame-src 'self';
        object-src 'none';
        base-uri 'self';
        form-action 'self';
    " always;

    # HSTS (uncomment only after verifying HTTPS is working)
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # =========================================================================
    # Client Max Body Size (50MB for image uploads)
    # =========================================================================
    client_max_body_size 50M;
    client_body_buffer_size 128k;

    # =========================================================================
    # Gzip Compression
    # =========================================================================
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        text/xml
        text/js
        application/json
        application/javascript
        application/x-javascript
        application/xml
        application/xml+rss
        application/manifest+json
        application/vnd.api+json
        image/svg+xml
        font/woff
        font/woff2;

    # =========================================================================
    # Static Asset Caching (Digest-based filenames are cacheable forever)
    # =========================================================================
    location /build/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location /fonts/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location /favicon.ico {
        log_not_found off;
        access_log off;
        expires 30d;
    }

    location /robots.txt {
        log_not_found off;
        access_log off;
    }

    # =========================================================================
    # Storage Link (public disk symlink)
    # =========================================================================
    location /storage/ {
        try_files $uri $uri/ /index.php?$query_string;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # =========================================================================
    # Laravel PHP Processing
    # =========================================================================
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass php-fpm;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        include fastcgi_params;

        fastcgi_buffer_size 128k;
        fastcgi_buffers 4 256k;
        fastcgi_busy_buffers_size 256k;
        fastcgi_read_timeout 300s;
    }

    # =========================================================================
    # Deny access to hidden files and sensitive paths
    # =========================================================================
    location ~ /\.(?!well-known) {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~ ^/(.env|.git|composer\.json|composer\.lock|artisan) {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~ /storage/\.log {
        deny all;
        access_log off;
        log_not_found off;
    }

    # =========================================================================
    # Deny access to backup/config files
    # =========================================================================
    location ~* \.(bak|config|sql|fla|psd|ini|log|sh|inc|swp|dist)$ {
        deny all;
        access_log off;
        log_not_found off;
    }

    # =========================================================================
    # Access & Error Logs
    # =========================================================================
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # =========================================================================
    # Additional Performance Tuning
    # =========================================================================
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;
}
