; =============================================================================
; Supervisor Configuration for Laravel Horizon
; Keeps Horizon running continuously with auto-restart on failure
; =============================================================================

[supervisord]
nodaemon = true
user = root
logfile = /var/log/supervisor/supervisord.log
logfile_maxbytes = 50MB
logfile_backups = 10
loglevel = info
pidfile = /var/run/supervisord.pid
childlogdir = /var/log/supervisor
minfds = 65535
minprocs = 200

[supervisorctl]
serverurl = unix:///var/run/supervisor.sock

[inet_http_server]
port = 127.0.0.1:9001
username = admin
password = horizon_secret

[include]
files = /etc/supervisor/conf.d/*.conf

; =============================================================================
; Horizon Process Group
; =============================================================================
[program:horizon]
command = php /var/www/artisan horizon
process_name = %(program_name)s_%(process_num)02d
numprocs = 1
directory = /var/www
autostart = true
autorestart = true
startsecs = 5
startretries = 10
exitcodes = 0
stopwaitsecs = 30
stopasgroup = true
killasgroup = true
user = www-data
stdout_logfile = /var/log/supervisor/horizon_stdout.log
stdout_logfile_maxbytes = 50MB
stdout_logfile_backups = 10
stdout_capture_maxbytes = 1MB
stdout_events_enabled = false
stderr_logfile = /var/log/supervisor/horizon_stderr.log
stderr_logfile_maxbytes = 50MB
stderr_logfile_backups = 10
stderr_capture_maxbytes = 1MB
stderr_events_enabled = false
environment = HOME="/var/www",USER="www-data"
