; =============================================================================
; PHP Configuration for Laravel Photo Builder Platform
; Optimized for image uploads and queue processing
; =============================================================================

[PHP]

; =============================================================================
; File Uploads (50MB max for high-res images)
; =============================================================================
file_uploads = On
upload_max_filesize = 50M
post_max_size = 55M
max_file_uploads = 20

; =============================================================================
; Execution Limits (300s for long-running image generation)
; =============================================================================
max_execution_time = 300
max_input_time = 300
default_socket_timeout = 300

; =============================================================================
; Memory (256MB for image processing)
; =============================================================================
memory_limit = 256M

; =============================================================================
; Error Handling & Logging
; =============================================================================
error_reporting = E_ALL & ~E_DEPRECATED & ~E_STRICT
display_errors = Off
display_startup_errors = Off
log_errors = On
error_log = /var/log/php/error.log
log_errors_max_len = 1024
ignore_repeated_errors = Off
ignore_repeated_source = Off
report_memleaks = On
track_errors = Off
html_errors = Off

; =============================================================================
; Data Handling
; =============================================================================
variables_order = "GPCS"
request_order = "GP"
register_globals = Off
register_long_arrays = Off
magic_quotes_gpc = Off
enable_dl = Off
allow_url_fopen = On
allow_url_include = Off
auto_prepend_file =
auto_append_file =
default_mimetype = "text/html"
default_charset = "UTF-8"
always_populate_raw_post_data = -1

; =============================================================================
; Paths and Directories
; =============================================================================
doc_root =
user_dir =
extension_dir = "/usr/local/lib/php/extensions/no-debug-non-zts-20230831/"
sys_temp_dir = /tmp

; =============================================================================
; File System
; =============================================================================
cgi.fix_pathinfo = 0
realpath_cache_size = 4096K
realpath_cache_ttl = 600

; =============================================================================
; Sessions (handled by Laravel, but set sane defaults)
; =============================================================================
session.save_handler = files
session.save_path = "/var/www/storage/framework/sessions"
session.use_strict_mode = 1
session.use_cookies = 1
session.use_only_cookies = 1
session.name = PHPSESSID
session.auto_start = 0
session.cookie_lifetime = 0
session.cookie_path = /
session.cookie_domain =
session.cookie_httponly = 1
session.cookie_samesite = "Lax"
session.serialize_handler = php
session.gc_probability = 1
session.gc_divisor = 100
session.gc_maxlifetime = 1440
session.referer_check =
session.cache_limiter = nocache
session.cache_expire = 180
session.use_trans_sid = 0
session.sid_length = 32
session.sid_bits_per_character = 5

; =============================================================================
; OPcache (Critical for Laravel Performance)
; =============================================================================
[opcache]
opcache.enable = 1
opcache.enable_cli = 0
opcache.memory_consumption = 128
opcache.interned_strings_buffer = 16
opcache.max_accelerated_files = 20000
opcache.max_wasted_percentage = 5
opcache.use_cwd = 1
opcache.validate_timestamps = 0
opcache.revalidate_freq = 2
opcache.revalidate_path = 0
opcache.save_comments = 1
opcache.quick_shutdown = 1
opcache.max_file_size = 0
opcache.consistency_checks = 0
opcache.force_restart_timeout = 180
opcache.error_log = /var/log/php/opcache.log
opcache.log_verbosity_level = 1
opcache.record_warnings = 0
opcache.enable_file_override = 0
opcache.validate_permission = 0
opcache.validate_root = 0

; =============================================================================
; JIT Compiler (PHP 8.3 - additional performance for CPU-intensive tasks)
; =============================================================================
opcache.jit = tracing
opcache.jit_buffer_size = 100M
opcache.jit_max_trace_length = 1024
opcache.jit_max_side_traces = 128
opcache.jit_max_exit_counters = 8192
opcache.jit_hot_loop = 64
opcache.jit_hot_func = 64
opcache.jit_hot_return = 64
opcache.jit_hot_side_exit = 64
opcache.jit_blacklist_root_trace = 16
opcache.jit_blacklist_side_trace = 8
opcache.jit_max_recursive_calls = 2
opcache.jit_max_recursive_returns = 2

; =============================================================================
; PHP-FPM Specific Settings (applied via www.conf)
; =============================================================================
[www]
pm = dynamic
pm.max_children = 50
pm.start_servers = 5
pm.min_spare_servers = 5
pm.max_spare_servers = 10
pm.max_requests = 500
pm.process_idle_timeout = 10s
pm.status_path = /php-fpm-status
ping.path = /php-fpm-ping
ping.response = pong

; =============================================================================
; Date & Time
; =============================================================================
[Date]
date.timezone = UTC

; =============================================================================
; Assertions
; =============================================================================
[Assert]
zend.assertions = -1

; =============================================================================
; PDO
; =============================================================================
[Pdo]
pdo_mysql.cache_size = 2000

; =============================================================================
; MySQLi
; =============================================================================
[MySQLi]
mysqli.max_persistent = -1
mysqli.allow_persistent = On
mysqli.max_links = -1
mysqli.cache_size = 2000
mysqli.default_port = 3306
mysqli.default_host =
mysqli.default_user =
mysqli.default_pw =
mysqli.reconnect = Off
